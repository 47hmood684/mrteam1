<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MR TEAM | موقع تحميل الملفات</title>
    <meta name="description" content="موقع تحميل ملفات احترافي وحصري من MR TEAM، بروابط مؤقتة وآمنة.">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Outfit:wght@700;900&display=swap"
        rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <!-- Background Animated Shapes -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <main class="container">

        <header class="header">
            <h1 class="logo">MR <span>TEAM</span></h1>
            <p class="subtitle">منصة الرفع السحابي الآمنة والمؤقتة</p>
        </header>

        <section class="upload-card glass-panel">
            <div id="drop-zone" class="drop-zone">
                <div class="drop-zone-content">
                    <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
                    <h2>اسحب وأفلت الملف هنا</h2>
                    <p>أو اضغط لاختيار ملف من جهازك</p>

                    <div class="options-group">
                        <label for="expiration-select"><i class="fa-regular fa-clock"></i> مدة بقاء الملف:</label>
                        <select id="expiration-select" class="premium-select">
                            <option value="1">يوم واحد</option>
                            <option value="7" selected>7 أيام</option>
                            <option value="30">30 يوماً</option>
                            <option value="permanent">دائم (لا يحذف)</option>
                        </select>
                    </div>

                    <input type="file" id="file-input" class="hidden-input">
                    <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">اختيار
                        ملف</button>
                    <p class="note" id="expiration-note"><i class="fa-solid fa-circle-info"></i> سيتم حذف الملف تلقائياً
                        بعد 7 أيام</p>
                </div>
            </div>

            <div id="upload-progress-container" class="progress-container hidden">
                <div class="file-details">
                    <i class="fa-solid fa-file-zipper"></i>
                    <span id="file-name-display">جاري الرفع...</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="progress-bar-fill" class="progress-bar-fill"></div>
                </div>
                <div class="progress-stats">
                    <span id="progress-text">0%</span>
                </div>
            </div>

            <div id="result-container" class="result-container hidden">
                <div class="success-icon">
                    <i class="fa-solid fa-check-circle"></i>
                </div>
                <h3>تم الرفع بنجاح!</h3>
                <p id="result-expiration-text">رابط التحميل الخاص بك (صالح لمدة 7 أيام):</p>

                <div class="link-box">
                    <input type="text" id="download-link" readonly>
                    <button id="copy-btn" class="btn btn-secondary" title="نسخ الرابط">
                        <i class="fa-regular fa-copy"></i>
                    </button>
                </div>

                <button class="btn btn-outline" id="upload-another-btn">
                    <i class="fa-solid fa-rotate-right"></i> رفع ملف آخر
                </button>
            </div>

            <div id="error-container" class="error-container hidden">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <p id="error-message">حدث خطأ أثناء الرفع. الرجاء المحاولة مرة أخرى.</p>
                <button class="btn btn-outline" id="retry-btn">إعادة المحاولة</button>
            </div>
        </section>

        <footer class="footer">
            <p>جميع الحقوق محفوظة &copy; <span id="current-year"></span> <strong>MR TEAM</strong></p>
        </footer>

    </main>

    <script src="script.js"></script>
</body>

</html>
